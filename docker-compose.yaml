services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    image: jetson-ros2-humble:latest
    container_name: jetson-ros2-humble
    restart: "no"
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker-xauth
      - LOCAL_UID=${LOCAL_UID:-1000}
      - LOCAL_GID=${LOCAL_GID:-1000}
      # SDL joystick-only mode — pygame won't try to open a display window
      - SDL_VIDEODRIVER=dummy
      - SDL_AUDIODRIVER=dummy
    network_mode: "host"  # web_teleop: UI on :8080, WebSocket on :8765
    ipc: host
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/bus/usb:/dev/bus/usb
    # Allow access to dynamically-created input devices (joystick, gamepad)
    device_cgroup_rules:
      - 'c 13:* rmw'
    volumes:
      - ./:/workspace:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker-xauth:/tmp/.docker-xauth:rw
      # Host Xauthority mounted read-only so the entrypoint can copy the
      # MIT-MAGIC-COOKIE into /tmp/.docker-xauth with FamilyWild rewriting.
      - ${XAUTHORITY:-~/.Xauthority}:/tmp/.host-xauth:ro
      # Expose all input devices (gamepad/joystick) inside the container
      - /dev/input:/dev/input
    working_dir: /workspace
    user: "root"
    shm_size: "1gb"
    cap_add:
      - SYS_PTRACE
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["bash", "-c", "sleep infinity"]
